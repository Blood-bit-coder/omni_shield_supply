<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Omni Shield | Enterprise Supply Chain on Aleo</title>
    <meta name="title" content="Omni Shield | Enterprise Supply Chain on Aleo" />
    <meta name="description" content="Real-time tracking, immutable records, and complete transparency for global supply chain operations powered by Aleo blockchain." />
    <meta name="keywords" content="blockchain, supply chain, aleo, zero-knowledge, tracking, inventory, transfers" />
    <meta name="author" content="Omni Shield" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://omni-shield-supply.vercel.app/" />
    <meta property="og:title" content="Omni Shield | Enterprise Supply Chain on Aleo" />
    <meta property="og:description" content="Real-time tracking, immutable records, and complete transparency for global supply chain operations powered by Aleo blockchain." />
    <meta property="og:image" content="https://omni-shield-supply.vercel.app/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://omni-shield-supply.vercel.app/" />
    <meta property="twitter:title" content="Omni Shield | Enterprise Supply Chain on Aleo" />
    <meta property="twitter:description" content="Real-time tracking, immutable records, and complete transparency for global supply chain operations powered by Aleo blockchain." />
    <meta property="twitter:image" content="https://omni-shield-supply.vercel.app/og-image.png" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#8B5CF6" />
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Loading indicator (hidden automatically when React loads) -->
    <div id="loading-indicator" style="
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      pointer-events: none;
    ">
      <div style="text-align: center;">
        <!-- Animated logo -->
        <div style="
          width: 80px;
          height: 80px;
          margin: 0 auto 20px;
          background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
          border-radius: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          animation: pulse 2s ease-in-out infinite;
        ">
          <span style="font-size: 40px; color: white;">🔰</span>
        </div>
        
        <!-- Loading text -->
        <div style="color: white; font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; margin-bottom: 8px;">
          Omni Shield
        </div>
        <div style="color: #8b5cf6; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; letter-spacing: 2px;">
          LOADING...
        </div>
        
        <!-- Animated dots -->
        <div style="margin-top: 20px; display: flex; gap: 8px; justify-content: center;">
          <div style="
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
          "></div>
          <div style="
            width: 8px;
            height: 8px;
            background: #8b5cf6;
            border-radius: 50%;
            animation: bounce 1.4s infinite 0.2s;
          "></div>
          <div style="
            width: 8px;
            height: 8px;
            background: #ec4899;
            border-radius: 50%;
            animation: bounce 1.4s infinite 0.4s;
          "></div>
        </div>
      </div>
    </div>
    
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(139, 92, 246, 0.8); }
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-10px); opacity: 1; }
      }
      
      /* Hide loading indicator when React is ready */
      #root:not(:empty) + #loading-indicator {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
